name: Build Spoofloc Package

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "spoofloc/**"
      - "pyproject.toml"
      - "packaging/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: bash packaging/make-dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spoofloc-dmg
          path: dist/Spoofloc.dmg
          retention-days: 30

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spoofloc-zip
          path: dist/Spoofloc.zip
          retention-days: 30

      - name: Update latest tag
        run: |
          git tag -f latest
          git push origin latest --force

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Automated build from the main branch.
          files: |
            dist/Spoofloc.dmg
            dist/Spoofloc.zip
          make_latest: true
